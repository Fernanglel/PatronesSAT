      <script>
function login() {
    const rfc = document.getElementById("usuario").value.trim();
    const password = document.getElementById("password").value.trim();

    // Validar RFC
    if (rfc.length !== 12 && rfc.length !== 13) {
        alert("El RFC debe tener 12 o 13 caracteres");
        return;
    }

    // Validar contraseña
    if (password === "") {
        alert("Debes ingresar una contraseña");
        return;
    }

    // Redirección
    if (rfc.length === 12) {
        window.location.href = "pagina12.html";
    } else {
        window.location.href = "pagina13.html";
    }
}
</script>
        <script src="js/vendor/modernizr-2.8.3-respond-1.4.2.min.js"></script>

   <body>

<div class="sat-wrapper">

  <div class="sat-container">

   <center><h1>SAT</h1></center> 

    <div class="form-group">
      <label>RFC:</label>
      <input type="text" id="usuario" placeholder="RFC" class="input">
    </div>

    <div class="form-group">
      <label>Contraseña:</label>
      <input type="password" id="password" placeholder="Contraseña" class="input">
    </div>

    <div class="btn-group">
      <button class="btn-principal" onclick="login()">Entrar</button>
    </div>
    <div class="links">
      <a href="#">Actualizar y/o adicionar correo electrónico</a><br>
      <a href="#">Obtener contraseña</a>
    </div>

  </div>

</div>
